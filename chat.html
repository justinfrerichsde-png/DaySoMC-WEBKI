<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DaySoMC KI Chat</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Inter',sans-serif;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      background:
        linear-gradient(rgba(5,10,20,0.72), rgba(5,10,20,0.86)),
        url('daysosmp.png') center/cover fixed;
      overflow-x:hidden;
    }

    /* Glows */
    .glow1,.glow2{
      position:fixed;border-radius:50%;filter:blur(100px);opacity:.35;pointer-events:none;
    }
    .glow1{width:300px;height:300px;background:#38bdf8;top:5%;left:-80px}
    .glow2{width:320px;height:320px;background:#8b5cf6;bottom:5%;right:-80px}

    /* Menü */
    nav{
      display:flex;
      justify-content:center;
      gap:16px;
      padding:16px;
      background:rgba(15,23,42,0.85);
      backdrop-filter:blur(8px);
      position:sticky;
      top:0;
      z-index:10;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }
    nav a{
      text-decoration:none;
      color:white;
      padding:8px 16px;
      border-radius:999px;
      font-weight:700;
      transition:.3s;
    }
    nav a:hover{
      background:linear-gradient(135deg,#38bdf8,#8b5cf6);
      color:#f8fafc;
    }

    /* Chat Container */
    .chat-container{
      flex:1;
      display:flex;
      flex-direction:column;
      max-width:800px;
      margin:24px auto;
      padding:16px;
      gap:12px;
      overflow-y:auto;
    }

    .message{
      padding:14px 20px;
      border-radius:32px;
      max-width:75%;
      word-wrap:break-word;
      animation: fadeIn 0.3s ease-out;
    }
    .user{
      background:rgba(56,189,248,0.3);
      align-self:flex-end;
      text-align:right;
    }
    .bot{
      background:rgba(139,92,246,0.3);
      align-self:flex-start;
      text-align:left;
    }

    /* Eingabe */
    .input-container{
      display:flex;
      gap:12px;
      padding:16px;
      max-width:800px;
      margin:auto;
    }
    input{
      flex:1;
      padding:14px 20px;
      border-radius:28px;
      border:none;
      font-size:1rem;
      outline:none;
    }
    button{
      padding:14px 24px;
      border:none;
      border-radius:28px;
      font-weight:700;
      color:white;
      background:linear-gradient(135deg,#38bdf8,#8b5cf6);
      cursor:pointer;
      transition:.25s;
    }
    button:hover{
      transform:translateY(-2px);
      filter:brightness(1.1);
    }

    @keyframes fadeIn{
      from {opacity:0; transform:translateY(10px);}
      to {opacity:1; transform:translateY(0);}
    }

    /* Schreibanimation */
    .typing span{
      opacity:0;
      animation: blink 1s infinite;
    }
    @keyframes blink{
      0%,50%,100%{opacity:0;}
      25%,75%{opacity:1;}
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius:4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius:4px; }

    @media(max-width:900px){
      .chat-container{padding:12px;}
      .input-container{padding:12px;}
    }
    @media(max-width:480px){
      nav{flex-direction:column;gap:8px;}
      input,button{width:100%;}
      .input-container{flex-direction:column;gap:8px;}
    }
  </style>
</head>
<body>
  <div class="glow1"></div>
  <div class="glow2"></div>

  <!-- Menü -->
  <nav>
    <a href="index.html">Startseite</a>
    <a href="videos.html">Videos</a>
    <a href="news.html">News</a>
    <a href="turniere.html">Turniere</a>
    <a href="plugins.html">Plugins</a>
    <a href="shader.html">Shader</a>
  </nav>

  <!-- Chat Bereich -->
  <div class="chat-container" id="chat"></div>

  <!-- Eingabe -->
  <div class="input-container">
    <input type="text" id="userInput" placeholder="Schreibe eine Nachricht...">
    <button id="sendBtn">Senden</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const button = document.getElementById('sendBtn');

    function addMessage(text,sender){
      const msg = document.createElement('div');
      msg.classList.add('message',sender);
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function botTyping(text){
      const msg = document.createElement('div');
      msg.classList.add('message','bot');
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;

      msg.textContent = '';
      for(let i=0;i<text.length;i++){
        msg.textContent += text[i];
        chat.scrollTop = chat.scrollHeight;
        await new Promise(r=>setTimeout(r,20));
      }
    }

    async function sendMessage(){
      const message = input.value.trim();
      if(!message) return;

      addMessage(message,'user');
      input.value = '';

      try{
        const res = await fetch('https://daysomc-webki.onrender.com/chat',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        await botTyping(data.reply);
      }catch(err){
        await botTyping('Server Fehler 😢');
        console.error(err);
      }
    }

    button.addEventListener('click',sendMessage);
    input.addEventListener('keypress',e=>{
      if(e.key==='Enter') sendMessage();
    });
  </script>
</body>
</html>
